# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  GOOS: "{{default OS .GOOS}}"
  MVNW: '{{if eq .GOOS "windows"}}mvnw.cmd{{else}}./mvnw{{end}}'
  DC_DIR: "deployment/docker-compose"
  INFRA_DC_FILE: "{{.DC_DIR}}/infra.yml"
  APPS_DC_FILE: "{{.DC_DIR}}/apps.yml"
  SLEEP_CMD: '{{if eq .GOOS "windows"}}powershell -Command "Start-Sleep -Seconds"{{else}}sleep{{end}}'

tasks:
  default:
    cmds:
      - task: test
  test:
    cmds:
      - "{{.MVNW}} clean verify"

  sleep:
    vars:
      DURATION: "{{default 5 .DURATION}}"
    cmds:
      - "{{.SLEEP_CMD}} {{.DURATION}}"

  build:
    cmds:
      - "{{.MVNW}} -pl inventory-service spring-boot:build-image -DskipTests"
      - "{{.MVNW}} -pl order-service spring-boot:build-image -DskipTests"
      - "{{.MVNW}} -pl payment-service spring-boot:build-image -DskipTests"

  start_infra:
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} up -d"

  stop_infra:
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} stop"
      - "docker compose -f {{.INFRA_DC_FILE}} rm -f"

  restart_infra:
    cmds:
      - task: stop_infra
      - task: sleep
      - task: start_infra

  start:
    deps: [build]
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} -f  {{.APPS_DC_FILE}} up -d"

  stop:
    cmds:
      - "docker compose -f {{.INFRA_DC_FILE}} -f  {{.APPS_DC_FILE}} stop"
      - "docker compose -f {{.INFRA_DC_FILE}} -f  {{.APPS_DC_FILE}} rm -f"

  restart:
    cmds:
      - task: stop
      - task: sleep
      - task: start

  kube_start:
    desc: "Start the Local Minikube Kubernetes Cluster"
    cmds:
      - "minikube start --driver=docker --cpus=4 --memory=4096 --ports=30081:30081,30082:30082,30083:30083"
      - "minikube addons enable metrics-server"

  kube_stop:
    desc: "Stop the Local Minikube Kubernetes Cluster"
    cmds:
      - "minikube stop"

  kube_delete:
    desc: "Delete the Local Minikube Kubernetes Cluster"
    cmds:
      - "minikube delete --all"

  kube_restart:
    desc: "Restart the Local Minikube Kubernetes Cluster"
    cmds:
      - task: kube_stop
      - task: sleep
      - task: kube_start

  k8s_start:
    desc: "Deploy the stack to Kubernetes"
    cmds:
      - "kubectl apply -f deployment/kubernetes/namespace.yaml"
      - "kubectl apply -f deployment/kubernetes/secrets.yaml"
      - "kubectl apply -f deployment/kubernetes/postgres.yaml"
      - "kubectl wait --for=condition=ready pod -l app=postgres -n bookstore-testbed --timeout=60s"
      - "kubectl apply -f deployment/kubernetes/inventory-service.yaml"
      - "kubectl apply -f deployment/kubernetes/payment-service.yaml"
      - "kubectl apply -f deployment/kubernetes/order-service.yaml"
      - "kubectl apply -f deployment/kubernetes/load-generator.yaml"
      - "kubectl get all -n bookstore-testbed"

  k8s_stop:
    desc: "Delete the stack from Kubernetes"
    cmds:
      - "kubectl delete -f deployment/kubernetes/load-generator.yaml --ignore-not-found"
      - "kubectl delete -f deployment/kubernetes/order-service.yaml --ignore-not-found"
      - "kubectl delete -f deployment/kubernetes/inventory-service.yaml --ignore-not-found"
      - "kubectl delete -f deployment/kubernetes/payment-service.yaml --ignore-not-found"
      - "kubectl delete -f deployment/kubernetes/postgres.yaml --ignore-not-found"
      - "kubectl delete -f deployment/kubernetes/namespace.yaml --ignore-not-found"

  k8s_status:
    desc: "Show status of the Kubernetes deployment"
    cmds:
      - "kubectl get all -n bookstore-testbed"

  k8s_restart:
    desc: "Restart the Kubernetes deployment"
    cmds:
      - task: k8s_stop
      - task: sleep
      - task: k8s_start
