apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: bookstore-testbed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: paritosh4495/csc8499-order-service:latest
        imagePullPolicy: Always
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "condition-a"  # THE Harness will set this to condition-a, or b based on the condition scenario
        - name: DB_URL
          value: jdbc:postgresql://postgres-db:5432/orders
        - name: DB_USERNAME
          value: postgres
        - name: DB_PASSWORD
          value: postgres
        - name: ORDER_INVENTORY_SERVICE_URL
          value: http://inventory-service:8081
        - name: ORDER_PAYMENT_SERVICE_URL
          value: http://payment-service:8083
        - name: _JAVA_OPTIONS
          value: "-Xms512m -Xmx512m"
        ports:
        - containerPort: 8082
        resources:
          requests:
            memory: "512Mi"
            cpu: "0.5"
          limits:
            memory: "700Mi"
            cpu: "1.0"
        readinessProbe:
          httpGet:
            path: "/actuator/health/readiness"
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: "/actuator/health/liveness"
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 20
          failureThreshold: 15 # Relaxed for fault injection
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: bookstore-testbed
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      nodePort: 30082
  type: NodePort