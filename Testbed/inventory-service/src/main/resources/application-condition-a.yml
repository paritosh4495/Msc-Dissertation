logging:
  structured:
    format:
      console: ecs
  level:
    root: INFO
    com.dissertation: INFO

    # Hide experiment/fault-injection internals
    com.dissertation.inventoryservice.fault: ERROR
    com.dissertation.inventoryservice.web.FaultController: ERROR



    # Narrow suppression of framework-native observability leakage
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: ERROR
    org.hibernate.engine.jdbc: ERROR  # catches any other jdbc sub-loggers
    org.springframework.boot.actuate: WARN
    io.micrometer: WARN
    io.prometheus: WARN
    io.github.resilience4j: WARN
    com.zaxxer.hikari: WARN